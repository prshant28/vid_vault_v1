packages:
  "framer-motion": "For page transitions, smooth modal appearances, and premium UI micro-interactions"
  "recharts": "For the dashboard statistics and area charts"
  "date-fns": "For formatting video publication and AI generation timestamps"
  "@hookform/resolvers": "For Zod form validation in the React Hook Form components"
  "clsx": "For conditional tailwind class joining"
  "tailwind-merge": "For safe tailwind class merging"

notes:
  - Expects auth to be handled via @workspace/replit-auth-web which exposes useAuth hook
  - API client hooks are imported directly from @workspace/api-client-react
  - YouTube embeds use standard iframe implementation parsing video ID from URLs
